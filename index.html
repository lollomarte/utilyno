<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteggio Camere</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy:#0a0f2e; --navy2:#111840; --navy3:#1a2455; --gold:#c8a84b; --gold2:#e8c96a; --white:#f5f5f0; --muted:#8891b5; --card-bg:#141b3d; }
  html,body { min-height:100vh; background:var(--navy); color:var(--white); font-family:'Barlow',sans-serif; }
  body { background-image: radial-gradient(ellipse 60% 40% at 50% 0%,#1e2b6e33 0%,transparent 70%), repeating-linear-gradient(0deg,transparent,transparent 59px,#ffffff06 59px,#ffffff06 60px), repeating-linear-gradient(90deg,transparent,transparent 59px,#ffffff06 59px,#ffffff06 60px); }
  header { text-align:center; padding:2.5rem 1rem 1.5rem; border-bottom:1px solid #ffffff12; }
  .ucl-star { font-size:28px; color:var(--gold); letter-spacing:8px; display:block; margin-bottom:0.5rem; }
  header h1 { font-family:'Barlow Condensed',sans-serif; font-size:clamp(2rem,6vw,3.5rem); font-weight:900; text-transform:uppercase; letter-spacing:0.06em; color:var(--white); line-height:1; }
  header h1 span { color:var(--gold); }
  header p { margin-top:0.5rem; font-size:13px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
  main { max-width:1100px; margin:0 auto; padding:2rem 1rem 4rem; display:grid; grid-template-columns:1fr 380px; gap:2rem; align-items:start; }
  @media(max-width:780px){ main{ grid-template-columns:1fr; } }
  .urn-section { text-align:center; }
  .section-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); margin-bottom:1.25rem; }
  .urn-wrap { position:relative; width:260px; height:290px; margin:0 auto 2rem; }
  .urn-svg { width:100%; height:100%; }
  .balls-container { display:flex; flex-wrap:wrap; justify-content:center; gap:14px; margin:0 auto 2rem; max-width:340px; }
  .ball { width:60px; height:60px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#e8c96a,#9a6f1c); border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; color:var(--navy); box-shadow:inset 0 -4px 8px rgba(0,0,0,0.3),0 4px 16px rgba(200,168,75,0.3); transition:transform 0.15s,box-shadow 0.15s; user-select:none; }
  .ball:hover:not(.used):not(.animating) { transform:scale(1.12) translateY(-4px); box-shadow:inset 0 -4px 8px rgba(0,0,0,0.3),0 10px 28px rgba(200,168,75,0.55); }
  .ball.used { background:#1a2050; border-color:#2d3d7a; color:#2d3d7a; cursor:default; box-shadow:none; opacity:0.4; }
  .ball.animating { animation:ballPop 0.55s ease forwards; cursor:default; pointer-events:none; }
  @keyframes ballPop { 0%{transform:scale(1)} 35%{transform:scale(1.35) translateY(-10px);box-shadow:0 20px 50px rgba(200,168,75,0.8)} 65%{transform:scale(0.88)} 100%{transform:scale(1)} }

  /* REVEAL */
  .reveal-overlay { display:none; position:fixed; inset:0; background:rgba(5,8,28,0.93); z-index:100; align-items:center; justify-content:center; flex-direction:column; padding:1rem; }
  .reveal-overlay.active { display:flex; }
  .reveal-box { text-align:center; animation:revealIn 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; max-width:360px; width:100%; }
  @keyframes revealIn { 0%{opacity:0;transform:scale(0.5) translateY(40px)} 100%{opacity:1;transform:scale(1) translateY(0)} }

  /* PHOTO CIRCLE */
  .reveal-photo-wrap {
    width: min(160px, 42vw);
    height: min(160px, 42vw);
    border-radius: 50%;
    border: 4px solid var(--gold2);
    margin: 0 auto 1rem;
    overflow: hidden;
    box-shadow: 0 0 0 2px var(--navy), 0 0 40px rgba(200,168,75,0.5);
    animation: glowPulse 1.5s ease-in-out infinite alternate;
  }
  @keyframes glowPulse { from{box-shadow:0 0 0 2px var(--navy),0 0 30px rgba(200,168,75,0.4)} to{box-shadow:0 0 0 2px var(--navy),0 0 70px rgba(200,168,75,0.85)} }
  .reveal-photo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }

  .reveal-easter { font-family:'Barlow Condensed',sans-serif; font-size:clamp(1.4rem,5vw,2.2rem); font-weight:900; letter-spacing:0.08em; color:var(--gold2); margin-bottom:0.4rem; animation:siuuu 0.5s ease forwards; }
  @keyframes siuuu { 0%{opacity:0;transform:scale(0.5) rotate(-5deg)} 50%{transform:scale(1.2) rotate(2deg)} 100%{opacity:1;transform:scale(1) rotate(0)} }
  .reveal-room-label { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin-bottom:0.25rem; }
  .reveal-name { font-family:'Barlow Condensed',sans-serif; font-size:clamp(2.4rem,9vw,4.2rem); font-weight:900; text-transform:uppercase; color:var(--white); letter-spacing:0.04em; line-height:1; margin-bottom:0.5rem; }
  .reveal-pair { font-family:'Barlow Condensed',sans-serif; font-size:clamp(1.1rem,4vw,1.6rem); font-weight:700; color:var(--gold2); margin-bottom:0.35rem; letter-spacing:0.04em; text-transform:uppercase; }
  .reveal-comment { font-size:14px; color:var(--muted); font-style:italic; margin-bottom:1.5rem; max-width:300px; margin-left:auto; margin-right:auto; line-height:1.5; }
  .reveal-continue { background:var(--gold); color:var(--navy); border:none; padding:13px 40px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; border-radius:4px; cursor:pointer; transition:background 0.15s,transform 0.1s; }
  .reveal-continue:hover { background:var(--gold2); transform:translateY(-1px); }

  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }
  .shake { animation:shake 0.5s ease; }
  .confetti-piece { position:fixed; width:10px; height:10px; top:-20px; border-radius:2px; pointer-events:none; z-index:200; animation:confettiFall linear forwards; }
  @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

  .dashboard .section-label { text-align:left; }
  .progress-wrap { margin-bottom:1.5rem; }
  .progress-track { height:3px; background:#1a2055; border-radius:2px; overflow:hidden; margin-top:8px; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:2px; transition:width 0.4s ease; width:0%; }
  .progress-text { font-size:12px; color:var(--muted); margin-top:6px; }
  .rooms-list { display:flex; flex-direction:column; gap:10px; }
  .room-row { background:var(--card-bg); border:1px solid #ffffff10; border-radius:8px; padding:10px 14px; display:flex; align-items:center; gap:12px; min-height:58px; }
  .room-row.singola { border-color:var(--gold); background:#1a1500; }
  .room-number { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:900; color:var(--gold); min-width:28px; line-height:1; }
  .room-type { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .room-occupants { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .occupant-chip { display:flex; align-items:center; gap:5px; background:var(--navy3); border:1px solid #3a4880; border-radius:20px; padding:2px 8px 2px 2px; font-size:11px; font-weight:700; font-family:'Barlow Condensed',sans-serif; color:var(--white); text-transform:uppercase; letter-spacing:0.05em; }
  .occupant-chip img { width:22px; height:22px; border-radius:50%; object-fit:cover; }
  .room-row.singola .occupant-chip { background:#2a1f00; border-color:var(--gold); color:var(--gold2); }
  .empty-slot { width:32px; height:20px; border:1px dashed #2d3a6a; border-radius:3px; }
  .final-banner { display:none; background:linear-gradient(135deg,#1a1500,#2a2000); border:1px solid var(--gold); border-radius:8px; padding:16px; text-align:center; margin-bottom:1.5rem; }
  .final-banner.show { display:block; }
  .final-banner p { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); }
  .reset-btn { margin-top:1rem; background:transparent; border:1px solid var(--gold); color:var(--gold); padding:8px 22px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; border-radius:4px; cursor:pointer; transition:background 0.15s; }
  .reset-btn:hover { background:#2a1f00; }
</style>
</head>
<body>

<header>
  <span class="ucl-star">★ ★ ★ ★ ★</span>
  <h1>Sorteggio <span>Camere</span></h1>
  <p>Clicca una pallina per estrarre</p>
</header>

<main>
  <div class="urn-section">
    <div class="section-label">Urna</div>
    <div class="urn-wrap">
      <svg class="urn-svg" viewBox="0 0 260 290" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="130" cy="56" rx="80" ry="18" fill="#1a2455" stroke="#c8a84b" stroke-width="1.5"/>
        <path d="M50 56 Q30 80 28 160 Q26 240 130 258 Q234 240 232 160 Q230 80 210 56" fill="#111840" stroke="#c8a84b" stroke-width="1.5"/>
        <path d="M50 56 Q30 80 28 160 Q26 200 130 215" fill="#0a0f2e" opacity="0.4"/>
        <ellipse cx="130" cy="258" rx="100" ry="20" fill="#1a2455" stroke="#c8a84b" stroke-width="1.5"/>
        <line x1="50" y1="64" x2="210" y2="64" stroke="#c8a84b" stroke-width="0.8" opacity="0.4"/>
        <path d="M28 110 Q10 120 10 140 Q10 158 28 160" stroke="#c8a84b" stroke-width="1.5" fill="none"/>
        <path d="M232 110 Q250 120 250 140 Q250 158 232 160" stroke="#c8a84b" stroke-width="1.5" fill="none"/>
        <text x="130" y="175" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-size="18" font-weight="900" fill="#c8a84b" letter-spacing="4" opacity="0.6">★★★</text>
      </svg>
    </div>
    <div class="section-label">Palline — clicca per estrarre</div>
    <div class="balls-container" id="ballsContainer"></div>
  </div>

  <div class="dashboard">
    <div class="section-label">Risultati sorteggio</div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 11 estratti</div>
    </div>
    <div class="final-banner" id="finalBanner">
      <p>★ Sorteggio Completato ★</p>
      <button class="reset-btn" onclick="resetDraw()">Nuovo sorteggio</button>
    </div>
    <div class="rooms-list" id="roomsList"></div>
  </div>
</main>

<div class="reveal-overlay" id="revealOverlay">
  <div class="reveal-box" id="revealBox">
    <div class="reveal-photo-wrap"><img id="revealPhoto" src="" alt=""></div>
    <div id="easterEgg"></div>
    <div class="reveal-room-label" id="revealRoomLabel"></div>
    <div class="reveal-name" id="revealName"></div>
    <div class="reveal-pair" id="revealPair"></div>
    <div class="reveal-comment" id="revealComment"></div>
    <button class="reveal-continue" onclick="closeReveal()">Continua ›</button>
  </div>
</div>

const ALL_NAMES = ["Lino","Privo","Musmo","Doc","LP","Pio","Tarquo","Bullo","Merek","Simoncino","Pav"];

const PAIR_COMMENTS = [
  "Che coppia! Meglio di Totti e Cassano.",
  "MAMMA MIA! Nessuno se lo aspettava.",
  "Accoppiata storica. I posteri ne parleranno.",
  "Il destino ha parlato. E non si discute.",
  "Incredibile! La UEFA stessa sarebbe orgogliosa.",
  "Due leggende. Una camera. Zero possibilità di dormire.",
  "Che abbinamento! Già leggenda prima di partire.",
  "Clamoroso! La storia del sorteggio è cambiata per sempre.",
  "Coppia da copertina. Puro cinema.",
  "Spettacolo puro. La folla è in delirio.",
];

const SINGOLA_COMMENTS = [
  "Tragedia. Silenzio. Buio.",
  "Solo contro il mondo. E contro il frigobar.",
  "Camera singola. Libertà assoluta. O solitudine cosmica.",
  "Nessuno russa. Nessuno accende la luce alle 3. Però nessuno c'è.",
  "Il letto è tutto tuo. Anche la tristezza.",
];

const ROOMS = [
  { id:1, type:"doppia", slots:2, occupants:[] },
  { id:2, type:"doppia", slots:2, occupants:[] },
  { id:3, type:"doppia", slots:2, occupants:[] },
  { id:4, type:"doppia", slots:2, occupants:[] },
  { id:5, type:"doppia", slots:2, occupants:[] },
  { id:6, type:"singola", slots:1, occupants:[] },
];

let shuffledNames = [...ALL_NAMES].sort(() => Math.random() - 0.5);
let extracted = 0;
let blocked = false;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playPop() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.start(); osc.stop(ctx.currentTime + 0.15);
}
function playReveal() {
  const ctx = getAudioCtx();
  [523,659,784,1047].forEach((freq,i) => {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "triangle"; osc.frequency.value = freq;
    const t = ctx.currentTime + i*0.12;
    gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(0.25,t+0.04); gain.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    osc.start(t); osc.stop(t+0.35);
  });
}
function playPairFanfare() {
  const ctx = getAudioCtx();
  [523,659,784,659,784,1047].forEach((freq,i) => {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "square"; osc.frequency.value = freq;
    const t = ctx.currentTime + i*0.1;
    gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(0.15,t+0.03); gain.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    osc.start(t); osc.stop(t+0.18);
  });
}
function playDramatic() {
  const ctx = getAudioCtx();
  [220,196,174,155].forEach((freq,i) => {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sawtooth"; osc.frequency.value = freq;
    const t = ctx.currentTime + i*0.22;
    gain.gain.setValueAtTime(0.2,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    osc.start(t); osc.stop(t+0.4);
  });
}
function playFinale() {
  const ctx = getAudioCtx();
  [[523,659,784],[587,740,880],[659,784,988],[784,988,1175]].forEach((chord,ci) => {
    chord.forEach(freq => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "triangle"; osc.frequency.value = freq;
      const t = ctx.currentTime + ci*0.22;
      gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(0.12,t+0.05); gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.5);
    });
  });
}

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function getRoomLabel(n) {
  if (n<=5) return `Camera doppia ${n} — 1° posto`;
  if (n<=10) return `Camera doppia ${n-5} — 2° posto`;
  return "Camera singola";
}
function assignToRoom(n, name) {
  if (n<=5) ROOMS[n-1].occupants.push(name);
  else if (n<=10) ROOMS[n-6].occupants.push(name);
  else ROOMS[5].occupants.push(name);
}

function buildBalls() {
  const c = document.getElementById("ballsContainer");
  c.innerHTML = "";
  shuffledNames.forEach((_,i) => {
    const b = document.createElement("div");
    b.className = "ball";
    b.textContent = i+1;
    b.dataset.idx = i;
    b.addEventListener("click", () => clickBall(b,i));
    c.appendChild(b);
  });
}

function clickBall(el, idx) {
  if (blocked || el.classList.contains("used") || el.classList.contains("animating")) return;
  blocked = true;
  playPop();
  el.classList.add("animating");
  setTimeout(() => {
    el.classList.remove("animating");
    el.classList.add("used");
    extracted++;
    const name = shuffledNames[idx];
    assignToRoom(extracted, name);
    updateDashboard();
    updateProgress();
    const isPair = extracted>=6 && extracted<=10;
    const isSingola = extracted===11;
    if (isPair) playPairFanfare();
    else if (isSingola) playDramatic();
    else playReveal();
    showReveal(el.textContent, name, extracted);
  }, 580);
}

function showReveal(ballNum, name, n) {
  document.getElementById("revealPhoto").src = PHOTOS[name] || "";
  document.getElementById("revealName").textContent = name;
  document.getElementById("revealRoomLabel").textContent = getRoomLabel(n);

  const egg = document.getElementById("easterEgg");
  egg.innerHTML = "";
  if (name === "LP") {
    const s = document.createElement("div");
    s.className = "reveal-easter";
    s.textContent = "SIUUUUUUUUM";
    egg.appendChild(s);
  }

  const pairEl = document.getElementById("revealPair");
  const commentEl = document.getElementById("revealComment");
  pairEl.textContent = "";
  commentEl.textContent = "";

  if (n>=6 && n<=10) {
    const partner = ROOMS[n-6].occupants[0];
    pairEl.textContent = `${partner} + ${name}`;
    commentEl.textContent = pick(PAIR_COMMENTS);
  } else if (n===11) {
    commentEl.textContent = pick(SINGOLA_COMMENTS);
    document.body.classList.add("shake");
    setTimeout(() => document.body.classList.remove("shake"), 500);
  }

  document.getElementById("revealOverlay").classList.add("active");
}

function closeReveal() {
  document.getElementById("revealOverlay").classList.remove("active");
  blocked = false;
  if (extracted===11) {
    document.getElementById("finalBanner").classList.add("show");
    launchConfetti();
    playFinale();
  }
}

function launchConfetti() {
  const colors = ["#c8a84b","#e8c96a","#fff","#378ADD","#D4537E","#1D9E75"];
  for (let i=0; i<80; i++) {
    setTimeout(() => {
      const el = document.createElement("div");
      el.className = "confetti-piece";
      el.style.left = Math.random()*100+"vw";
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.animationDuration = (1.5+Math.random()*2)+"s";
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, Math.random()*1200);
  }
}

function updateProgress() {
  const pct = (extracted/11)*100;
  document.getElementById("progressFill").style.width = pct+"%";
  document.getElementById("progressText").textContent = `${extracted} / 11 estratti`;
}

function updateDashboard() {
  const list = document.getElementById("roomsList");
  list.innerHTML = "";
  ROOMS.forEach(room => {
    const row = document.createElement("div");
    row.className = "room-row"+(room.type==="singola"?" singola":"");
    const num = document.createElement("div");
    num.className = "room-number";
    num.textContent = room.id;
    const info = document.createElement("div");
    info.style.flex = "1";
    const typeEl = document.createElement("div");
    typeEl.className = "room-type";
    typeEl.textContent = room.type==="singola"?"Camera singola":"Camera doppia";
    const occ = document.createElement("div");
    occ.className = "room-occupants";
    room.occupants.forEach(name => {
      const chip = document.createElement("span");
      chip.className = "occupant-chip";
      const img = document.createElement("img");
      img.src = PHOTOS[name] || "";
      img.alt = name;
      const label = document.createElement("span");
      label.textContent = name;
      chip.appendChild(img);
      chip.appendChild(label);
      occ.appendChild(chip);
    });
    for (let i=0; i<room.slots-room.occupants.length; i++) {
      const slot = document.createElement("div");
      slot.className = "empty-slot";
      occ.appendChild(slot);
    }
    info.appendChild(typeEl);
    info.appendChild(occ);
    row.appendChild(num);
    row.appendChild(info);
    list.appendChild(row);
  });
}

function resetDraw() {
  extracted=0; blocked=false;
  shuffledNames = [...ALL_NAMES].sort(()=>Math.random()-0.5);
  ROOMS.forEach(r=>r.occupants=[]);
  document.getElementById("finalBanner").classList.remove("show");
  document.getElementById("progressFill").style.width="0%";
  document.getElementById("progressText").textContent="0 / 11 estratti";
  buildBalls(); updateDashboard();
}

buildBalls();
updateDashboard();
</script>
