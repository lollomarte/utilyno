<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcolatore Percentuale online gratis — sconto, aumento, variazione | Utilyno</title>
  <meta name="description" content="Calcola percentuali gratuitamente: percentuale di un numero, sconto, aumento, variazione tra due valori. Risultato immediato.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="canonical" href="https://utilyno.it/utilities/calcola-percentuale/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0a0a0a; --surface:#141414; --surface2:#1c1c1c; --border:rgba(255,255,255,0.08); --text:#f0f0f0; --text-muted:rgba(240,240,240,0.5); --text-dim:rgba(240,240,240,0.22); --green:#4ade80; --red:#f87171; --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif; }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; min-height:100dvh; display:flex; flex-direction:column; }
    header { padding:1.25rem 2rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .logo { font-family:var(--mono); font-size:15px; color:var(--text); text-decoration:none; }
    .logo span { color:var(--text-dim); }
    .back { font-family:var(--mono); font-size:12px; color:var(--text-dim); text-decoration:none; transition:color 0.2s; }
    .back:hover { color:var(--text-muted); }
    main { max-width:560px; margin:0 auto; width:100%; padding:3rem 1.5rem 6rem; flex:1; }
    .page-label { font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.75rem; }
    h1 { font-size:clamp(26px,5vw,40px); font-weight:300; letter-spacing:-0.02em; margin-bottom:0.5rem; }
    .page-sub { font-size:14px; color:var(--text-muted); font-weight:300; margin-bottom:2rem; }
    .tabs { display:flex; gap:0; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:2rem; }
    .tab { flex:1; padding:0.65rem 0.5rem; font-family:var(--mono); font-size:11px; letter-spacing:0.04em; color:var(--text-dim); background:none; border:none; cursor:pointer; transition:all 0.2s; text-align:center; border-right:1px solid var(--border); }
    .tab:last-child { border-right:none; }
    .tab:hover { color:var(--text-muted); background:var(--surface); }
    .tab.active { background:var(--surface); color:var(--text); }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem; display:flex; flex-direction:column; gap:1.5rem; }
    .field { display:flex; flex-direction:column; gap:0.5rem; }
    label { font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase; }
    input[type="number"] { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--mono); font-size:22px; font-weight:300; padding:0.85rem 1rem; width:100%; outline:none; transition:border-color 0.2s; -moz-appearance:textfield; }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; }
    input[type="number"]:focus { border-color:rgba(255,255,255,0.2); }
    .result-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:1.25rem; display:flex; flex-direction:column; gap:0.35rem; }
    .result-amount { font-family:var(--mono); font-size:32px; font-weight:300; color:var(--text); letter-spacing:-0.02em; }
    .result-sub { font-family:var(--mono); font-size:12px; color:var(--text-dim); }
    .result-amount.up { color:var(--green); }
    .result-amount.down { color:var(--red); }
    footer { border-top:1px solid var(--border); padding:1.25rem 2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
    .footer-copy { font-family:var(--mono); font-size:11px; color:var(--text-dim); }
    .footer-links { display:flex; gap:1.5rem; }
    .footer-links a { font-family:var(--mono); font-size:11px; color:var(--text-dim); text-decoration:none; transition:color 0.2s; }
    .footer-links a:hover { color:var(--text-muted); }
    @media (max-width:600px) { header { padding:1rem; } main { padding:2rem 1rem 4rem; } .tab { font-size:10px; } }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">utilyno<span>.it</span></a>
    <a href="/utilities/" class="back">← utilities</a>
  </header>
  <main>
    <div class="page-label">// calcolo</div>
    <h1>Calcolatore %</h1>
    <p class="page-sub">Percentuali, sconti, aumenti e variazioni in un click.</p>
    <div class="tabs">
      <button class="tab active" data-mode="of">% di numero</button>
      <button class="tab" data-mode="what">Che % è</button>
      <button class="tab" data-mode="change">Variazione</button>
      <button class="tab" data-mode="discount">Sconto</button>
    </div>
    <div class="card" id="card"></div>
  </main>
  <footer>
    <div class="footer-copy">© 2025 Lorenzo Martegiani — P.IVA 17512421003</div>
    <div class="footer-links">
      <a href="/privacy/">privacy</a>
      <a href="/cookie/">cookie</a>
    </div>
  </footer>
  <script>
    let mode = 'of';

    const MODES = {
      of: {
        fields: [
          { id:'a', label:'Percentuale (%)', placeholder:'es. 15' },
          { id:'b', label:'Di quale numero', placeholder:'es. 200' }
        ],
        calc: (a,b) => {
          const r = a/100*b;
          return { result: fmt(r), sub: a+'% di '+b+' = '+fmt(r) };
        }
      },
      what: {
        fields: [
          { id:'a', label:'Numero', placeholder:'es. 30' },
          { id:'b', label:'È percentuale di', placeholder:'es. 200' }
        ],
        calc: (a,b) => {
          const r = a/b*100;
          return { result: fmtPct(r), sub: a+' è il '+fmtPct(r)+' di '+b };
        }
      },
      change: {
        fields: [
          { id:'a', label:'Valore iniziale', placeholder:'es. 100' },
          { id:'b', label:'Valore finale', placeholder:'es. 130' }
        ],
        calc: (a,b) => {
          const r = (b-a)/Math.abs(a)*100;
          const cls = r>=0 ? 'up' : 'down';
          const sign = r>=0 ? '+' : '';
          return { result: sign+fmtPct(r), sub: 'variazione da '+a+' a '+b, cls };
        }
      },
      discount: {
        fields: [
          { id:'a', label:'Prezzo originale (€)', placeholder:'es. 120' },
          { id:'b', label:'Sconto (%)', placeholder:'es. 20' }
        ],
        calc: (a,b) => {
          const disc = a*b/100;
          const final = a-disc;
          return { result: fmt(final), sub: 'risparmi '+fmt(disc)+' sul prezzo di '+fmt(a) };
        }
      }
    };

    function fmt(n) { return parseFloat(n.toFixed(2)).toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fmtPct(n) { return parseFloat(n.toFixed(4)).toLocaleString('it-IT', { maximumFractionDigits: 4 }) + '%'; }

    function renderCard() {
      const m = MODES[mode];
      const card = document.getElementById('card');
      card.innerHTML = m.fields.map(f => `
        <div class="field">
          <label>${f.label}</label>
          <input type="number" id="${f.id}" placeholder="${f.placeholder}" step="any" inputmode="decimal">
        </div>
      `).join('') + `
        <div class="result-box">
          <div class="result-amount" id="result">—</div>
          <div class="result-sub" id="result-sub"></div>
        </div>
      `;
      card.querySelectorAll('input').forEach(i => i.oninput = calc);
    }

    function calc() {
      const aEl = document.getElementById('a'), bEl = document.getElementById('b');
      const a = parseFloat(aEl?.value), b = parseFloat(bEl?.value);
      const resultEl = document.getElementById('result');
      const subEl = document.getElementById('result-sub');
      if (isNaN(a) || isNaN(b) || b === 0) { resultEl.textContent = '—'; resultEl.className = 'result-amount'; subEl.textContent = ''; return; }
      try {
        const r = MODES[mode].calc(a, b);
        resultEl.textContent = r.result;
        resultEl.className = 'result-amount' + (r.cls ? ' ' + r.cls : '');
        subEl.textContent = r.sub || '';
      } catch(e) { resultEl.textContent = '—'; }
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        mode = tab.dataset.mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderCard();
      };
    });

    renderCard();
  </script>
</body>
</html>
