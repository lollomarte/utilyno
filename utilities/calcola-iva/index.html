<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcola IVA online gratis — 22%, 10%, 4% | Utilyno</title>
  <meta name="description" content="Calcola l'IVA italiana al 22%, 10% o 4%. Ottieni subito imponibile, imposta e totale lordo. Gratuito, senza registrazione.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="canonical" href="https://utilyno.it/utilities/calcola-iva/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0a0a0a; --surface:#141414; --surface2:#1c1c1c; --border:rgba(255,255,255,0.08); --text:#f0f0f0; --text-muted:rgba(240,240,240,0.5); --text-dim:rgba(240,240,240,0.22); --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif; }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; min-height:100dvh; display:flex; flex-direction:column; }
    header { padding:1.25rem 2rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .logo { font-family:var(--mono); font-size:15px; color:var(--text); text-decoration:none; }
    .logo span { color:var(--text-dim); }
    .back { font-family:var(--mono); font-size:12px; color:var(--text-dim); text-decoration:none; transition:color 0.2s; }
    .back:hover { color:var(--text-muted); }
    main { max-width:560px; margin:0 auto; width:100%; padding:3rem 1.5rem 6rem; flex:1; }
    .page-label { font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.75rem; }
    h1 { font-size:clamp(26px,5vw,40px); font-weight:300; letter-spacing:-0.02em; margin-bottom:0.5rem; }
    .page-sub { font-size:14px; color:var(--text-muted); font-weight:300; margin-bottom:2.5rem; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem; display:flex; flex-direction:column; gap:1.5rem; }
    .field { display:flex; flex-direction:column; gap:0.5rem; }
    label { font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase; }
    input[type="number"] { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--mono); font-size:22px; font-weight:300; padding:0.85rem 1rem; width:100%; outline:none; transition:border-color 0.2s; -moz-appearance:textfield; }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; }
    input[type="number"]:focus { border-color:rgba(255,255,255,0.2); }
    .rate-btns { display:flex; gap:8px; }
    .rate-btn { flex:1; padding:0.65rem; font-family:var(--mono); font-size:14px; background:none; border:1px solid var(--border); border-radius:6px; color:var(--text-muted); cursor:pointer; transition:all 0.2s; }
    .rate-btn:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
    .rate-btn.active { background:var(--surface2); border-color:rgba(255,255,255,0.25); color:var(--text); }
    .toggle-row { display:flex; gap:8px; }
    .toggle-btn { flex:1; padding:0.6rem; font-family:var(--mono); font-size:12px; background:none; border:1px solid var(--border); border-radius:6px; color:var(--text-dim); cursor:pointer; transition:all 0.2s; letter-spacing:0.04em; }
    .toggle-btn:hover { border-color:rgba(255,255,255,0.2); color:var(--text-muted); }
    .toggle-btn.active { background:var(--surface2); border-color:rgba(255,255,255,0.25); color:var(--text); }
    .results { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .result-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:1rem; display:flex; flex-direction:column; gap:0.35rem; }
    .result-label { font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase; }
    .result-val { font-family:var(--mono); font-size:18px; font-weight:300; color:var(--text); }
    .result-item.highlight { border-color:rgba(255,255,255,0.2); }
    .result-item.highlight .result-val { font-size:22px; }
    footer { border-top:1px solid var(--border); padding:1.25rem 2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
    .footer-copy { font-family:var(--mono); font-size:11px; color:var(--text-dim); }
    .footer-links { display:flex; gap:1.5rem; }
    .footer-links a { font-family:var(--mono); font-size:11px; color:var(--text-dim); text-decoration:none; transition:color 0.2s; }
    .footer-links a:hover { color:var(--text-muted); }
    @media (max-width:600px) { header { padding:1rem; } main { padding:2rem 1rem 4rem; } .results { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">utilyno<span>.it</span></a>
    <a href="/utilities/" class="back">← utilities</a>
  </header>
  <main>
    <div class="page-label">// calcolo</div>
    <h1>Calcolatore IVA</h1>
    <p class="page-sub">Calcola l'IVA italiana partendo da imponibile o da lordo.</p>
    <div class="card">
      <div class="field">
        <label>Importo (€)</label>
        <input type="number" id="amount" value="100" min="0" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label>Aliquota IVA</label>
        <div class="rate-btns">
          <button class="rate-btn active" data-rate="22">22%</button>
          <button class="rate-btn" data-rate="10">10%</button>
          <button class="rate-btn" data-rate="4">4%</button>
          <button class="rate-btn" data-rate="0">0%</button>
        </div>
      </div>
      <div class="field">
        <label>L'importo inserito è</label>
        <div class="toggle-row">
          <button class="toggle-btn active" id="btn-netto">Imponibile (netto)</button>
          <button class="toggle-btn" id="btn-lordo">Totale (lordo)</button>
        </div>
      </div>
      <div class="results">
        <div class="result-item">
          <div class="result-label">Imponibile</div>
          <div class="result-val" id="res-netto">—</div>
        </div>
        <div class="result-item">
          <div class="result-label">IVA</div>
          <div class="result-val" id="res-iva">—</div>
        </div>
        <div class="result-item highlight">
          <div class="result-label">Totale lordo</div>
          <div class="result-val" id="res-lordo">—</div>
        </div>
      </div>
    </div>
  </main>
  <footer>
    <div class="footer-copy">© 2025 Lorenzo Martegiani — P.IVA 17512421003</div>
    <div class="footer-links">
      <a href="/privacy/">privacy</a>
      <a href="/cookie/">cookie</a>
    </div>
  </footer>
  <script>
    let rate = 22, mode = 'netto';

    function fmt(n) { return n.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €'; }

    function calc() {
      const amount = parseFloat(document.getElementById('amount').value);
      if (isNaN(amount) || amount < 0) {
        ['res-netto','res-iva','res-lordo'].forEach(id => document.getElementById(id).textContent = '—');
        return;
      }
      let netto, iva, lordo;
      if (mode === 'netto') {
        netto = amount; iva = amount * rate / 100; lordo = amount + iva;
      } else {
        lordo = amount; netto = amount / (1 + rate / 100); iva = lordo - netto;
      }
      document.getElementById('res-netto').textContent = fmt(netto);
      document.getElementById('res-iva').textContent = fmt(iva);
      document.getElementById('res-lordo').textContent = fmt(lordo);
    }

    document.querySelectorAll('.rate-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.rate-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        rate = parseInt(btn.dataset.rate);
        calc();
      };
    });

    document.getElementById('btn-netto').onclick = () => {
      mode = 'netto';
      document.getElementById('btn-netto').classList.add('active');
      document.getElementById('btn-lordo').classList.remove('active');
      calc();
    };

    document.getElementById('btn-lordo').onclick = () => {
      mode = 'lordo';
      document.getElementById('btn-lordo').classList.add('active');
      document.getElementById('btn-netto').classList.remove('active');
      calc();
    };

    document.getElementById('amount').oninput = calc;
    calc();
  </script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
