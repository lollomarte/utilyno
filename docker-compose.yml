services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: loqo
      POSTGRES_PASSWORD: loqo
      POSTGRES_DB: loqo
    ports:
      - "5432:5432"
    volumes:
      - loqo-postgres-data:/var/lib/postgresql/data

volumes:
  loqo-postgres-data:
