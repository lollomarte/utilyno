services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: werent
      POSTGRES_PASSWORD: werent
      POSTGRES_DB: werent
    ports:
      - "5432:5432"
    volumes:
      - werent-postgres-data:/var/lib/postgresql/data

volumes:
  werent-postgres-data:
